name: Publish to NuGet

on:
  release:
    types: [created]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack
      run: dotnet pack --configuration Release --no-build --output ${{github.workspace}}/packages

    - name: Publish to NuGet
      run: dotnet nuget push ${{github.workspace}}/packages/*.nupkg --api-key ${{secrets.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

    - name: Authenticate to GitHub Packages
      run: dotnet nuget add source --username CdrSonan --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/CdrSonan/index.json"

    - name: Publish to GitHub Packages
      run: dotnet nuget push ${{github.workspace}}/packages/*.nupkg --source github
